# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
clusterName: kubernetes
talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"
endpoint: https://192.168.69.5:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.69.5"
additionalMachineCertSans: *sans
clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]
# Disable built-in CNI to use Cilium
cniConfig:
  name: none
nodes:
  - hostname: "rpi-00"
    ipAddress: "192.168.68.252"
    nodeLabels:
      piraeus.io/storage: "true"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
      mode: metal
      arch: arm64
    patches:
      - "@./patches/rpi-00/machine-kubelet.yaml"
    schematic:
      overlay:
        options:
          configTxt: |
            gpu_mem=16
            kernel=u-boot.bin
            arm_64bit=1
            arm_boost=1
            enable_uart=1
            dtoverlay=disable-bt
            dtoverlay=disable-wifi
            avoid_warnings=2
            dtoverlay=pwm-gpio-fan,gpiopin=18
        image: siderolabs/sbc-raspberrypi
        name: rpi_generic
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/drbd
            - siderolabs/zfs
    # talosImageURL: factory.talos.dev/installer/b882a159b77ed3ecea434ddfa29f68599e72749c94c6e3e2b66b3121e6624a22
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "dc:a6:32:eb:ff:81"
        addresses:
          - 192.168.68.252/22
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
        vip:
          ip: "192.168.69.5"
  - hostname: "c-01"
    ipAddress: "192.168.68.253"
    nodeLabels:
      piraeus.io/storage: "true"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: true
      mode: metal
      arch: amd64
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e8:ff:1e:d2:90:ed"
        addresses:
          - 192.168.68.253/22
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
        vip:
          ip: "192.168.69.5"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/drbd
            - siderolabs/zfs
    patches:
      - "@./patches/c-01/system-disk-ssd.yaml"
      - "@./patches/c-01/raw-volume-hdd.yaml"
  # TODO:: add user volume
  - hostname: "c-02"
    ipAddress: "192.168.68.254"
    nodeLabels:
      piraeus.io/storage: "true"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: true
      mode: metal
      arch: amd64
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "38:05:25:34:67:7e" # This is the right ethernet port
        addresses:
          - 192.168.68.254/22
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
        vip:
          ip: "192.168.69.5"
    schematic:
      customization:
        extraKernelArgs:
          - amd_iommu=off
          - amdgpu.gttsize=126976
          - ttm.pages_limit=32505856
        systemExtensions:
          officialExtensions:
            - siderolabs/drbd
            - siderolabs/zfs
            - siderolabs/amdgpu
            - siderolabs/amd-ucode
    patches:
      - "@./patches/c-02/system-disk-ssd-1.yaml"
      - "@./patches/c-02/raw-volume-ssd-0.yaml"
# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-watchdog.yaml"
# Controller patches
controlPlane:
  kernelModules:
    - name: drbd
      parameters:
        - usermode_helper=disabled
    - name: drbd_transport_tcp
    # LVM_THIN storage pools require this module
    - name: dm-thin-pool
    # ZFS storage pools require this module from the ZFS extension
    - name: zfs
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
