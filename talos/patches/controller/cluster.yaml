cluster:
  allowSchedulingOnControlPlanes: true
  apiServer:
    extraArgs:
      # https://kubernetes.io/docs/tasks/extend-kubernetes/configure-aggregation-layer/
      enable-aggregator-routing: true
      default-watch-cache-size: "5"
    resources:
      requests:
        memory: "512Mi"
      limits:
        memory: "1536Mi"
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
    resources:
      requests:
        memory: "256Mi"
      limits:
        memory: "256Mi"
  coreDNS:
    disabled: true
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
    advertisedSubnets:
      - 192.168.68.1/23
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
    resources:
      requests:
        memory: "128Mi"
      limits:
        memory: "128Mi"
