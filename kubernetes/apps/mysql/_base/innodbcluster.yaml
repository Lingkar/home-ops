# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/mysql.oracle.com/innodbcluster_v2.json
apiVersion: mysql.oracle.com/v2
kind: InnoDBCluster
metadata:
  name: mysql-0
spec:
  secretName: mysql-credentials
  tlsUseSelfSigned: true
  version: 8.0.45
  instances: 1
  router:
    instances: 1
    podSpec:
      resources:
        requests:
          cpu: 15m
          memory: 72Mi
        limits:
          memory: 72Mi
  edition: community
  # NOTE: podSpec is only regarded during StatefulSet buildup.
  # The operator neither checks nor watches for changes to this field,
  # so CR updates alone will NOT trigger a StatefulSet update.
  # A manual restart, pod eviction, or StatefulSet delete may be needed
  # for resource changes to take effect.
  #
  # Resources are set per-container using name-based merge (supported by the
  # operator's merge_patch_object, matching containers by their "name" field).
  podSpec:
    priorityClassName: platform-high
    containers:
    - name: sidecar
      resources:
        requests:
          cpu: 10m
          memory: 178Mi
        limits:
          memory: 178Mi
    - name: mysql
      resources:
        requests:
          cpu: 15m
          memory: 1089Mi
        limits:
          memory: 1089Mi
  datadirVolumeClaimTemplate:
    storageClassName: ssd-lvm-thin-2
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
  backupProfiles:
    - name: default
      dumpInstance:
        storage:
          persistentVolumeClaim:
            claimName: mysql-backup
  backupSchedules:
    - name: daily
      enabled: true
      backupProfileName: default
      deleteBackupData: false
      schedule: "45 1 * * *"
