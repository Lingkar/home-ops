# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.6.2/charts/library/common/values.schema.json
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  hostIPC: false
  hostNetwork: false
  hostPID: false
  shareProcessNamespace: false
controllers:
  main:
    containers:
      main:
        image:
          repository: docker.io/wordpress
          tag: 6.9.2@sha256:ba1996f128e96e06613cffd9efa17e619d077a427c2d135204b1bc3bc9fa0510
        env:
          - name: WORDPRESS_DB_HOST
            value: mysql.mysql.svc.cluster.local
          - name: WORDPRESS_DB_NAME
            value: phela
          - name: WORDPRESS_DB_USER
            value: phela
          - name: WORDPRESS_DB_PASSWORD
            secretKeyRef:
              name: mysql-credentials
              key: PASSWORD
service:
  main:
    ports:
      http:
        port: 80
        protocol: TCP
route:
  main:
    parentRefs:
      - name: external
        namespace: network
    hostnames: ["phela-intelligence.com"]
persistence:
  wordpress-data:
    type: persistentVolumeClaim
    storageClass: ssd-lvm-thin-1
    accessMode: ReadWriteOnce
    size: 4Gi
    retain: true
    advancedMounts:
      main:
        main:
          - path: /var/www/html
            readOnly: false
