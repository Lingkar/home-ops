# yaml-language-server: $schema=https://raw.githubusercontent.com/piraeusdatastore/helm-charts/refs/heads/main/charts/linstor-cluster/values.schema.json
monitoring:
  enabled: true
linstorCluster:
  linstorPassphraseSecret: linstor-passphrase
  nodeSelector:
    piraeus.io/storage: "true"
  controller:
    podTemplate:
      spec:
        containers:
          - name: linstor-controller
            resources:
              requests:
                cpu: 256m
                memory: 3Gi
              limits:
                memory: 3Gi
  affinityController:
    podTemplate:
      spec:
        containers:
          - name: linstor-affinity-controller
            resources:
              requests:
                cpu: 10m
                memory: 70Mi
              limits:
                memory: 70Mi
  highAvailabilityController:
    podTemplate:
      spec:
        containers:
          - name: ha-controller
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
  nfsServer:
    enabled: false
  csiNode:
    podTemplate:
      spec:
        containers:
          - name: linstor-csi
            image: quay.io/piraeusdatastore/piraeus-csi:v1.11.2@sha256:b3ebbbd9d62d3226128303d1418ec087a021ca4746e1b613d0c12c0cbc9ca937
            args:
              - --log-level=debug
              - --csi-endpoint=unix:///csi/csi.sock
              - --node=$(KUBE_NODE_NAME)
              - --property-namespace=Aux/topology
              - --label-by-storage-pool=false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
          - name: csi-node-driver-registrar
            resources:
              requests:
                cpu: 10m
                memory: 36Mi
              limits:
                memory: 36Mi
          - name: csi-livenessprobe
            resources:
              requests:
                cpu: 10m
                memory: 36Mi
              limits:
                memory: 36Mi
  csiController:
    podTemplate:
      spec:
        containers:
          - name: linstor-csi
            image: quay.io/piraeusdatastore/piraeus-csi:v1.11.2@sha256:b3ebbbd9d62d3226128303d1418ec087a021ca4746e1b613d0c12c0cbc9ca937
            args:
              - --log-level=debug
              - --csi-endpoint=unix://$(ADDRESS)
              - --property-namespace=$(PROPERTY_NAMESPACE)
              - --label-by-storage-pool=$(LABEL_BY_STORAGE_POOL)
              - --enable-rwx=$(ENABLE_RWX)
              - --nfs-reactor-config-map-name=$(NFS_REACTOR_CONFIG_MAP_NAME)
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
          - name: csi-attacher
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
          - name: csi-livenessprobe
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 32Mi
          - name: csi-provisioner
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 50Mi
                memory: 64Mi
          - name: csi-snapshotter
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
          - name: csi-resizer
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
          - name: csi-health-monitor
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
linstorSatelliteConfigurations:
  - name: talos-loader-override
    podTemplate:
      spec:
        containers:
          - name: linstor-satellite
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 512Mi
          - name: drbd-reactor
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
        initContainers:
          - name: drbd-shutdown-guard
            $patch: delete
          - name: drbd-module-loader
            $patch: delete
        volumes:
          - name: run-systemd-system
            $patch: delete
          - name: run-drbd-shutdown-guard
            $patch: delete
          - name: systemd-bus-socket
            $patch: delete
          - name: lib-modules
            $patch: delete
          - name: usr-src
            $patch: delete
          - name: etc-lvm-backup
            hostPath:
              path: /var/etc/lvm/backup
              type: DirectoryOrCreate
          - name: etc-lvm-archive
            hostPath:
              path: /var/etc/lvm/archive
              type: DirectoryOrCreate
  - name: c-01
    nodeSelector:
      kubernetes.io/hostname: c-01
    storagePools:
      - name: ssd-lvm-thin
        lvmThinPool:
          volumeGroup: vg1
          thinPool: thin
        source:
          hostDevices:
            - /dev/disk/by-partlabel/r-ssd-0
      - name: hdd-raidz-thin
        zfsThinPool: {}
  - name: c-02
    nodeSelector:
      kubernetes.io/hostname: c-02
    storagePools:
      - name: ssd-lvm-thin
        lvmThinPool:
          volumeGroup: vg1
          thinPool: thin
        source:
          hostDevices:
            - /dev/disk/by-partlabel/r-ssd-0
            - /dev/disk/by-partlabel/r-ssd-1
