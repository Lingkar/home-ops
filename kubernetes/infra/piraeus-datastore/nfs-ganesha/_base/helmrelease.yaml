# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-ganesha-server
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-server-provisioner
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: nfs-ganesha-server
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: values-nfs-ganesha-server
    - kind: ConfigMap
      name: values-nfs-ganesha-server
      valuesKey: env-values.yaml
