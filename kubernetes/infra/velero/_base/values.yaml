# yaml-language-server: $schema=https://raw.githubusercontent.com/vmware-tanzu/helm-charts/refs/heads/main/charts/velero/values.schema.json
credentials:
  existingSecret: s3-credentials
configuration:
  features: EnableCSI
  garbageCollectionFrequency: 15m
  terminatingResourceTimeout: 30m
  defaultItemOperationTimeout: 30m
  backupStorageLocation:
    - name: hetzner
      provider: velero.io/aws
      bucket: buijnsters-home-backup
      prefix: velero
      default: true
      config:
        region: fsn1
        s3Url: https://fsn1.your-objectstorage.com
        s3ForcePathStyle: "true"
  volumeSnapshotLocation:
    - name: hetzner
      provider: velero.io/aws
      config:
        region: fsn1
        s3Url: https://fsn1.your-objectstorage.com
        s3ForcePathStyle: "true"
  defaultRepoMaintainFrequency: 24h # Set equal to minimal backup frequency https://kopia.discourse.group/t/default-schedule-for-maintaince-seem-too-agressive/2299/7
schedules:
  # pv-snapshots:
  #   disabled: false
  #   schedule: "5 */4 * * *" # Back-up every fourth hour
  #   template:
  #     ttl: 10h
  #     excludedNamespaces: [] # Should exclude certain namespaces in the future
  #     includedResources:
  #       - pv
  #       - pvc
  pv-snapshots-local:
    schedule: "0 */4 * * *" # Back-up every fourth hour
    template:
      ttl: 12h
      snapshotVolumes: true
      snapshotMoveData: false
      excludedNamespaces: [] # Should exclude certain namespaces in the future
      includedResources:
        - pv
        - pvc
  pv-snapshots-remote-daily:
    schedule: "15 2 * * *" # Back-up every day at 02:15
    template:
      ttl: 168h # 1 week
      snapshotVolumes: true
      snapshotMoveData: true
      excludedNamespaces: [] # Should exclude certain namespaces in the future
      includedResources:
        - pv
        - pvc
  pv-snapshots-remote-weekly:
    schedule: "15 3 * * mon" # Back-up every Monday at 02:15
    template:
      ttl: 850h # 35 days
      snapshotVolumes: true
      snapshotMoveData: true
      excludedNamespaces: [] # Should exclude certain namespaces in the future
      includedResources:
        - pv
        - pvc
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.1@sha256:1493a0039cd5cb31004cfbb52f8a1990bc0ed81497ce72516bc76fa9e21506c1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
deployNodeAgent: true
metrics:
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true
    spec:
      - alert: VeleroBackupFailed
        annotations:
          message: Velero backup {{ $labels.schedule }} has failed
        expr: |-
          velero_backup_last_status{schedule!=""} != 1
        for: 15m
        labels:
          severity: warning
      - alert: VeleroBackupFailing
        annotations:
          message: Velero backup {{ $labels.schedule }} has been failing for the last 12h
        expr: |-
          velero_backup_last_status{schedule!=""} != 1
        for: 12h
        labels:
          severity: critical
      - alert: VeleroNoNewBackup
        annotations:
          message: Velero backup {{ $labels.schedule }} has not run successfully in the last 25h
        expr: |-
          (
          (time() - velero_backup_last_successful_timestamp{schedule!=""}) >bool (25 * 3600)
          or
          absent(velero_backup_last_successful_timestamp{schedule!=""})
          ) == 1
        for: 1h
        labels:
          severity: critical
      - alert: VeleroBackupPartialFailures
        annotations:
          message: Velero backup {{ $labels.schedule }} has {{ $value | humanizePercentage }} partially failed backups
        expr: |-
          rate(velero_backup_partial_failure_total{schedule!=""}[25m])
            / rate(velero_backup_attempt_total{schedule!=""}[25m]) > 0.5
        for: 15m
        labels:
          severity: warning
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: beta.kubernetes.io/arch
              operator: In
              values:
                - amd64
resources:
  requests:
    cpu: 20m
    memory: 500Mi
  limits:
    memory: 500Mi
nodeAgent:
  nodeSelector:
    piraeus.io/storage: "true"
  resources:
    requests:
      cpu: 30m
      memory: 135Mi
    limits:
      memory: 135Mi
