# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-keycloak
spec:
  instances: 3
  storage:
    size: 1Gi
    storageClass: ssd-lvm-thin-2
  resources:
    requests:
      cpu: 30m
      memory: 200Mi
    limits:
      memory: 200Mi
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: cnpg-keycloak
spec:
  name: app
  owner: app
  cluster:
    name: keycloak
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
spec:
  hostnames:
    - keycloak.${SECRET_DOMAIN}
  parentRefs:
    - name: external
      namespace: network
  rules:
    - backendRefs:
        - name: kc-infra-service
          port: 8080
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/k8s.keycloak.org/keycloak_v2beta1.json
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: kc-infra
spec:
  instances: 1
  db:
    vendor: postgres
    database: app
    host: cnpg-keycloak-rw
    usernameSecret:
      name: cnpg-keycloak-app
      key: username
    passwordSecret:
      name: cnpg-keycloak-app
      key: password
  ingress:
    enabled: false
  hostname:
    hostname: keycloak.${SECRET_DOMAIN}
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded
  bootstrapAdmin:
    service:
      secret: kc-admin-creds
  resources:
    requests:
      cpu: 10m
      memory: 1256Mi
    limits:
      cpu: 2
      memory: 1256Mi
