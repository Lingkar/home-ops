apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: kc-provider-config
spec:
  credentials:
    source: Secret
    secretRef:
      name: kc-admin-creds
      namespace: keycloak-system
---
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
metadata:
  name: kc-whoop
spec:
  forProvider:
    realm: whoop
  providerConfigRef:
    name: kc-provider-config
