apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: kc-provider-config
spec:
  credentials:
    source: Secret
    secretRef:
      name: kc-admin-creds
      key: credentials
      namespace: keycloak-system
---
apiVersion: user.keycloak.crossplane.io/v1alpha1
kind: Roles
metadata:
  name: admin
spec:
  forProvider:
    realmId: master
    userIdRef:
      name: admin
    roleIds:
      - admin
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
metadata:
  name: infra
spec:
  forProvider:
    realm: infra
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: identityprovider.keycloak.crossplane.io/v1alpha1
kind: KubernetesIdentityProvider
metadata:
  name: infra-kubernetes
spec:
  forProvider:
    realmRef:
      name: infra
    alias: kubernetes
    issuer: "https://192.168.69.5"
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  name: infra-admin
spec:
  forProvider:
    realmIdRef:
      name: infra
    name: admin
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  name: infra-dev
spec:
  forProvider:
    realmIdRef:
      name: infra
    name: dev
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: infra-harbor
spec:
  forProvider:
    realmIdRef:
      name: infra
    name: harbor
    clientId: harbor
    accessType: CONFIDENTIAL
    standardFlowEnabled: true
    baseUrl: https://harbor.${SECRET_DOMAIN}
    rootUrl: https://harbor.${SECRET_DOMAIN}
    validRedirectUris:
      - https://harbor.${SECRET_DOMAIN}/*
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientScope
metadata:
  name: infra-groups
spec:
  forProvider:
    realmIdRef:
      name: infra
    name: groups
    description: "Groups - add the user groups"
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: infra-harbor
spec:
  forProvider:
    realmIdRef:
      name: infra
    clientIdRef:
      name: infra-harbor
    defaultScopes:
      - groups
      - email
      - profile
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: openidgroup.keycloak.crossplane.io/v1alpha1
kind: GroupMembershipProtocolMapper
metadata:
  name: infra-groupmembership
spec:
  forProvider:
    clientScopeIdRef:
      name: infra-groups
    realmIdRef:
      name: infra
    name: "group membership"
    claimName: groups
  providerConfigRef:
    name: kc-provider-config
