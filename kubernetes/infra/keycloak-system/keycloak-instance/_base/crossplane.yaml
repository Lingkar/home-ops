apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: keycloak-provider-config
spec:
  credentials:
    source: Secret
    secretRef:
      name: kc-admin-creds
      key: credentials
      namespace: crossplane-system
---
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
spec:
  forProvider:
    realm: whoop
  providerConfigRef:
    kind: providerConfig
    name: keycloak-provider-config
