apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: kc-provider-config
spec:
  credentials:
    source: Secret
    secretRef:
      name: kc-admin-creds
      key: credentials
      namespace: keycloak-system
---
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
metadata:
  name: infra
spec:
  forProvider:
    realm: infra
  providerConfigRef:
    name: kc-provider-config
# ---
# apiVersion: oidc.keycloak.crossplane.io/v1alpha1
# kind: IdentityProvider
# metadata:
#   name: infra-kubernetes
# spec:
#   forProvider:
#     realm: infra
#     alias: kubernetes
#     issuer: "192.168.69.5"
#   providerConfigRef:
#     name: kc-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  name: infra-admin
spec:
  forProvider:
    realmId: infra
    name: admin
  providerConfigRef:
    name: kc-provider-config
---
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  name: infra-dev
spec:
  forProvider:
    realmId: infra
    name: dev
  providerConfigRef:
    name: kc-provider-config
