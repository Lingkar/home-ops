# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes-operator
      version: 0.2.2
      sourceRef:
        kind: HelmRepository
        name: netbirdio
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: values-netbird
    - kind: ConfigMap
      name: values-netbird
      valuesKey: env-values.yaml
