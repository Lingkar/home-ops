# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: amd-gpu-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: gpu-operator-charts
      version: v1.4.1
      sourceRef:
        kind: HelmRepository
        name: rocm
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: values-amd-gpu-operator
    - kind: ConfigMap
      name: values-amd-gpu-operator
      valuesKey: env-values.yaml
