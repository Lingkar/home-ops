# by default the managementURL points to the NetBird cloud service: https://api.netbird.io:443
# managementURL: "https://netbird.example.io:443"
ingress:
  enabled: true
  kubernetesAPI:
    enabled: true
  # router:
  #   enabled: true
  policies:
    default:
      name: Kubernetes Default Policy
      sourceGroups:
        - All
netbirdAPI:
  keyFromSecret:
    name: "netbird-mgmt-api-key"
    key: "NB_API_KEY"
